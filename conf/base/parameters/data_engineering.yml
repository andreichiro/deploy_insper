raw_columns:
  target:
    - Outcome
  categorical: []
  numerical:
    - Pregnancies
    - Glucose
    - BloodPressure
    - SkinThickness
    - Insulin
    - BMI
    - DiabetesPedigreeFunction
    - Age

columns:
  target:
    - Outcome
  categorical: []
  numerical:
    - Pregnancies
    - Glucose
    - BloodPressure
    - SkinThickness
    - Insulin
    - BMI
    - DiabetesPedigreeFunction
    - Age
    - glucose_bmi_interaction

split_ratio:
  train: 0.7
  validation: 0.15
  test: 0.15

random_state: 42

stratify_column: Outcome

fit_transform:
  split_to_fit:
    - train

# Pré-processamento sklearn 100% declarativo (class_path + init_args).
preprocessing:
  train_test_split_function: sklearn.model_selection.train_test_split
  min_rows_for_stratify: 20
  split_strategy:
    kind: stratified_random
    label: stratified_random_baseline
    description: >
      O projeto usa split estratificado aleatorio pela coluna target para manter
      a distribuicao da classe entre treino, validacao e teste.
  categorical_encoder:
    class_path: sklearn.preprocessing.OrdinalEncoder
    init_args:
      handle_unknown: use_encoded_value
      unknown_value: -1
      dtype: int
  numerical_scaler:
    class_path: sklearn.preprocessing.StandardScaler
    init_args: {}
